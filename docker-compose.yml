# ──────────────────────────────────────────────────────────────────────────────
#  allPlayer — Go Backend + React Frontend
#  Connects to existing nginx-proxy + acme-companion on sumit_proxy network
#  Deploy: docker compose up -d --build
# ──────────────────────────────────────────────────────────────────────────────

services:

  # ── Local Telegram Bot API Server (removes 20MB file limit) ─────────────────
  telegram-bot-api:
    image: aiogram/telegram-bot-api:latest
    container_name: allplayer-telegram-api
    environment:
      TELEGRAM_API_ID: ${TELEGRAM_API_ID}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH}
      TELEGRAM_LOCAL: "true"
    volumes:
      - telegram-data:/var/lib/telegram-bot-api
    expose:
      - "8081"
    restart: unless-stopped
    networks:
      - internal

  # ── Go Backend API ──────────────────────────────────────────────────────────
  backend:
    build: ./server
    container_name: allplayer-backend
    expose:
      - "3001"
    env_file: ./server/.env
    environment:
      DB_PATH: /app/data/allplayer.db
      PORT: 3001
      TELEGRAM_API_URL: http://telegram-bot-api:8081
    volumes:
      - backend-data:/app/data
      - telegram-data:/var/lib/telegram-bot-api
    depends_on:
      - telegram-bot-api
    restart: unless-stopped
    networks:
      - internal

  # ── React Frontend (serves UI + proxies /api to backend) ────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: allplayer-frontend
    expose:
      - "80"
    environment:
      VIRTUAL_HOST: player.figmaforge.io
      VIRTUAL_PORT: "80"
      LETSENCRYPT_HOST: player.figmaforge.io
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - sumit_proxy
      - internal

volumes:
  backend-data:
  telegram-data:

networks:
  sumit_proxy:
    external: true
  internal:
    driver: bridge
